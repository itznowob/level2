<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Sea Core // 極限地獄核心</title>
    <style>
        body {
            background-color: #01060a;
            color: #80ccff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }
        
        body::after {
            content: "";
            position: absolute;
            width: 200vw;
            height: 200vh;
            background: radial-gradient(circle, transparent 20%, #01060a 70%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(2, 11, 20, 0.9);
            padding: 40px;
            border: 1px solid #004466;
            box-shadow: 0 0 30px rgba(0, 136, 255, 0.15);
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-size: 2em;
            letter-spacing: 5px;
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1em;
            color: #66a3cc;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* 倒數計時器 */
        #timer-box {
            font-size: 1.8em;
            color: #ff4d4d;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff4d4d;
            display: none;
        }

        .dashboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px;
            background: #001a33;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            border: 1px solid #004466;
        }

        .target-freq { color: #80ccff; }
        .interference { color: #ffcc00; }
        .current-freq { color: #4db8ff; } 

        .bit-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .bit-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bit-value {
            font-size: 0.8em;
            color: #336699;
            margin-bottom: 5px;
        }

        .bit-btn {
            width: 60px;
            height: 80px;
            background-color: #001a33;
            border: 2px solid #004466;
            color: #4db8ff;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Courier New', Courier, monospace;
        }

        .bit-btn.active {
            background-color: #4db8ff;
            border-color: #80e6ff;
            color: #020b14;
            box-shadow: 0 0 20px rgba(77, 184, 255, 0.6);
        }

        /* 危險的確認寫入按鈕 */
        .submit-btn {
            background-color: transparent;
            color: #ff4d4d;
            border: 2px solid #ff4d4d;
            padding: 15px 40px;
            font-size: 1.5em;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            background-color: rgba(255, 77, 77, 0.2);
            box-shadow: 0 0 15px #ff4d4d;
        }

        #success-screen {
            display: none;
            text-align: center;
            animation: fadeIn 2s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .final-code {
            font-size: 3em;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin: 20px 0;
            letter-spacing: 10px;
        }

        .hint-text {
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container" id="game-screen">
        <h1>CORE OVERRIDE // 系統受損</h1>
        <p>警告：深海磁場引發邏輯異常，數值已完全隨機化。<br>輸入值將與「干擾金鑰」進行 <strong>XOR (^)</strong> 運算。<br>寫入錯誤或超時將導致核心重置。你有 30 秒。</p>
        
        <div id="timer-box">⚠ 核心熔毀倒數: <span id="time-display">30</span>s ⚠</div>

        <div class="dashboard">
            <div class="target-freq">目標: <span id="target-display">0</span></div>
            <div class="interference">干擾(XOR): <span id="key-display">0</span></div>
            <div class="current-freq">輸出: <span id="current-display">0</span></div>
        </div>

        <div class="bit-container">
            <div class="bit-box"><div class="bit-value">128</div><button class="bit-btn" onclick="toggleBit(this, 128)">0</button></div>
            <div class="bit-box"><div class="bit-value">64</div><button class="bit-btn" onclick="toggleBit(this, 64)">0</button></div>
            <div class="bit-box"><div class="bit-value">32</div><button class="bit-btn" onclick="toggleBit(this, 32)">0</button></div>
            <div class="bit-box"><div class="bit-value">16</div><button class="bit-btn" onclick="toggleBit(this, 16)">0</button></div>
            <div class="bit-box"><div class="bit-value">8</div><button class="bit-btn" onclick="toggleBit(this, 8)">0</button></div>
            <div class="bit-box"><div class="bit-value">4</div><button class="bit-btn" onclick="toggleBit(this, 4)">0</button></div>
            <div class="bit-box"><div class="bit-value">2</div><button class="bit-btn" onclick="toggleBit(this, 2)">0</button></div>
            <div class="bit-box"><div class="bit-value">1</div><button class="bit-btn" onclick="toggleBit(this, 1)">0</button></div>
        </div>

        <button class="submit-btn" onclick="submitAnswer()">[ 寫入核心 ]</button>
    </div>

    <div class="container" id="success-screen">
        <h1 style="color:#4db8ff;">SYSTEM FULLY UNLOCKED</h1>
        <p>太神了！你竟然在 30 秒內破解了隨機 XOR 陣列！</p>
        <p>第九個代碼是：<strong>s8KzL5</strong></p>
        <div class="final-code">Congrate!</div>
        <p>第十關的代碼可以回去觀察前面九個代碼，可能可以看出一點東西(?</p>
        <p class="hint-text">提示：人要看向前面一點的東西</p>
    </div>

    <script>
        // 隨機產生 5 關的目標與干擾金鑰 (0 ~ 255)
        const targets = [];
        const keys = [];
        for(let i = 0; i < 5; i++) {
            targets.push(Math.floor(Math.random() * 256));
            keys.push(Math.floor(Math.random() * 256));
        }
        
        let currentLevel = 0;
        let currentRawSum = 0; 
        
        // 計時器變數 (改成 30 秒)
        let timeLeft = 30;
        let timerInterval;
        let timerStarted = false;

        // 初始化第一關畫面
        document.getElementById('target-display').innerText = targets[0];
        document.getElementById('key-display').innerText = keys[0];

        function startTimer() {
            document.getElementById('timer-box').style.display = 'block';
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time-display').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("【系統崩潰】時間到！核心已熔毀，強制重啟！");
                    location.reload(); 
                }
            }, 1000);
        }

        function toggleBit(btn, value) {
            if (!timerStarted) {
                timerStarted = true;
                startTimer();
            }

            if (btn.innerText === "0") {
                btn.innerText = "1";
                btn.classList.add("active");
                currentRawSum += value;
            } else {
                btn.innerText = "0";
                btn.classList.remove("active");
                currentRawSum -= value;
            }

            let processedOutput = currentRawSum ^ keys[currentLevel];
            document.getElementById('current-display').innerText = processedOutput;
        }

        // 確認寫入的無情判斷
        function submitAnswer() {
            if (!timerStarted) {
                timerStarted = true;
                startTimer();
            }

            let processedOutput = currentRawSum ^ keys[currentLevel];

            if (processedOutput === targets[currentLevel]) {
                // 算對了，進入下一關
                currentLevel++;
                
                if (currentLevel >= targets.length) {
                    clearInterval(timerInterval); 
                    document.getElementById('game-screen').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'block';
                    return;
                }

                currentRawSum = 0;
                document.getElementById('current-display').innerText = "0"; 
                document.getElementById('target-display').innerText = targets[currentLevel];
                document.getElementById('key-display').innerText = keys[currentLevel];
                
                const btns = document.querySelectorAll('.bit-btn');
                btns.forEach(btn => {
                    btn.innerText = "0";
                    btn.classList.remove("active");
                });
            } else {
                // 算錯了，直接死亡重啟
                clearInterval(timerInterval);
                alert("【警告】數值錯誤！核心防禦機制已將你踢出系統！");
                location.reload();
            }
        }
    </script>
</body>
</html>
