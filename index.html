<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>The Matrix of Renai</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        .center-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.75); 
            padding: 40px;
            border: 1px solid #00ff00;
            border-radius: 10px;
            box-shadow: 0 0 20px #00ff00;
        }

        h1 {
            color: #00ff00;
            font-size: 28px;
            text-shadow: 0 0 8px #00ff00;
            margin-bottom: 20px;
        }

        p {
            color: #ffffff;
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="center-box">
        <h1>恭喜你發現了樂奈想說的東西</h1>
        <p>下一關的線索就在這裡<br>找找看吧。</p>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*樂奈';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: columns }).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; 
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        console.log("%c诶你怎麼在亂看網頁內碼好色喔", "color: #ff55ff; font-size: 20px; font-weight: bold;");
        console.log("%c但你都到這裡了就給你答案吧", "color: #ffffff; font-size: 14px;");
        console.log("%c第二關通關代碼：_2xYpQ", "color: #00ff00; font-size: 18px; background: #222; padding: 4px 8px; border-radius: 4px;");
        console.log("%c", "font-size: 10px;"); // 空行
        console.log("%c下一關的線索好像不小心掉到南極火山口被糊掉加密了", "color: #ffaa00; font-size: 14px;");
        console.log("%c線索是: VGhlIENvZGU6IGM2TmJNMg==", "color: #ff5555; font-size: 18px; font-weight: bold; background: #330000; padding: 4px;");
        console.log("%c然後我看到那邊的摩洛哥豹用 == 的眼神看著我 不知道甚麼意思诶", "color: #aaaaaa; font-size: 14px; font-style: italic;");
    </script>
</body>
</html>
