<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>System Entrance</title>
    <style>
        /* 重置邊界並設定黑底 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }
        
        /* 設定亂碼背景的畫布 */
        canvas {
            display: block;
        }

        /* 極簡風格的對話框 */
        .center-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: #ffffff; 
            padding: 40px;
            border: 2px solid #000000; 
        }

        /* 移除所有特效，純黑色的字 */
        h1 {
            color: #000000; 
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        p {
            color: #000000;
            font-size: 18px;
            line-height: 1.5;
            font-weight: bold;
        }

        /* 想找線索？
            這裡只有網頁的外殼。
            真正的秘密，藏在開發者與系統「對話」的地方。
            (提示：看看上方的標籤頁，Console / 主控台 在哪裡？)
        */
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="center-box">
        <h1>恭喜你發現了這裡</h1>
        <p>下一關的線索就在這裡<br>找找看吧。</p>
    </div>

    <script>
        // === 黑白亂碼瀑布特效 (JavaScript) ===
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 純粹的英數與符號
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: columns }).fill(1);

        function draw() {
            // 留下黑色的殘影
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 純白色的亂碼
            ctx.fillStyle = '#ffffff'; 
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        // === 【真正的線索：隱藏在 Console 中】 ===
        console.log("诶你怎麼在亂看網頁內碼好色喔");
        console.log("但你都到這裡了就給你答案吧");
        console.log("第二關通關代碼：_2xYpQ");
        console.log("");
        console.log("下一關的線索好像不小心掉到南極火山口被糊掉加密了");
        console.log("線索是: PT09PT09PT09PT09PT09CuaBreWWnOS9oOino+mWi+S6huaRqea0m+WTpeixueeahOS6gueivArnrKzkuInpl5zpgJrpl5zku6PnorzvvJpjNk5iTTIK56ys5Zub6Zec55qE57ea57Si77yaU0hOUlVECuaPkOekuiAx77ya5rKZ5ouJCuaPkOekuiAy77ya5Zue5Yiw5p+Q5YCL5rKS5LuA6bq86aGP6Imy55qE5Zyw5pa56Kmm6KmmCj09PT09PT09PT09PT09PQ==");
        console.log("然後我看到那邊的摩洛哥豹用 == 的眼神看著我 不知道甚麼意思诶");

        // === 【隱藏機關：Pekora 鍵盤監聽彩蛋】 ===
        let secretBuffer = "";
        
        // 當使用者在鍵盤上按下任何按鍵時
        document.addEventListener('keydown', function(event) {
            // 把按下的字母全部轉成大寫，加入記憶體中
            secretBuffer += event.key.toUpperCase();
            
            // 因為 PEKORA 是 6 個字母，我們保留最後 6 個輸入的字母
            if (secretBuffer.length > 6) {
                secretBuffer = secretBuffer.substring(secretBuffer.length - 6);
            }
            
            // 如果參賽者成功在網頁上盲打了 PEKORA
            if (secretBuffer === "PEKORA") {
                // 跳出系統警告框給予獎勵，加上經典的 peko！
                alert("【Pekopekopeko】\n第四關通關代碼：1mR4bV\n第五關線索：尋找這個網站裡不存在的角落");
            }
        });
    </script>
</body>
</html>
